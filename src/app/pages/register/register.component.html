<div class="login-page">

  <div class="page-logos">
    <img src="assets/eccmslogo.png" alt="E-CCMS Logo">
    <img src="assets/icpep.png" alt="ICPEP Logo">
  </div>

  <div class="top-links">
    <a routerLink="/login">About us</a>
    <a href="#">Contact Us</a>
  </div>

  <div class="login-card">

    <h3 class="title">Register an Account</h3>

  <!-- Popup Notification Overlay -->
  <div class="popup-backdrop" *ngIf="registerSuccess || registerError">
    <div class="popup-box" [ngClass]="registerSuccess ? 'popup-success' : 'popup-error'">
      <div class="popup-icon">
        <span *ngIf="registerSuccess">&#10003;</span>
        <span *ngIf="registerError">&#10007;</span>
      </div>
      <h4 class="popup-title">{{ registerSuccess ? 'Success' : 'Registration Failed' }}</h4>
      <p class="popup-message">{{ registerSuccess ? successMessage : errorMessage }}</p>
      <button class="popup-close-btn" (click)="registerSuccess = false; registerError = false">
        {{ registerSuccess ? 'Continue' : 'Try Again' }}
      </button>
    </div>
  </div>

    <!-- Template-driven form -->
    <form #registerForm="ngForm" (ngSubmit)="onSubmit(registerForm)" novalidate>

      <!-- Email / Phone -->
      <div class="auth-input-group">
        <span class="auth-icon">👤</span>
        <input
          type="text"
          name="email"
          placeholder="Email or Phone number"
          ngModel
          required
          #email="ngModel"
        />
      </div>
      <div class="error-message" *ngIf="email.invalid && email.touched">
        Email or phone is required.
      </div>

      <!-- Password -->
      <div class="auth-input-group">
        <span class="auth-icon">🔒</span>
        <input
          type="password"
          name="password"
          placeholder="Password"
          ngModel
          required
          minlength="6"
          #password="ngModel"
        />
      </div>
    
      <!-- Confirm Password -->
      <div class="auth-input-group">
        <span class="auth-icon">🔒</span>
        <input
          type="password"
          name="confirmPassword"
          placeholder="Confirm Password"
          ngModel
          required
          #confirmPassword="ngModel"
        />
      </div>


      <!-- Submit button -->
    <button type="submit" class="login-btn">
        Register Account
      </button>

      <p class="signup-text">
        Already have an account?
        <a routerLink="/login">Login</a>
      </p>
      

    </form>

  </div>

</div>
