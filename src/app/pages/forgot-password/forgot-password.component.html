<div class="forgot-password-page">

  <div class="page-logos">
    <img src="assets/eccmslogo.png" alt="E-CCMS Logo">
    <img src="assets/icpep.png" alt="ICPEP Logo">
  </div>

  <div class="top-links">
    <a href="#">About us</a>
    <a href="#">Contact Us</a>
  </div>

  <div class="forgot-password-card">

    <div class="popup-backdrop" *ngIf="success || error">
      <div class="popup-box" [ngClass]="success ? 'popup-success' : 'popup-error'">
        <div class="popup-icon">
          <span *ngIf="success">&#10003;</span>
          <span *ngIf="error">&#10007;</span>
        </div>
        <h4 class="popup-title">{{ success ? 'Success' : 'Unable to Send Code' }}</h4>
        <p class="popup-message">{{ message }}</p>
        <button class="popup-close-btn" type="button" (click)="closePopup()">
          {{ success ? 'Continue' : 'Try Again' }}
        </button>
      </div>
    </div>

    <h2 class="title">Forgot Password</h2>

    <p class="subtitle">
      Enter your Email or Phone number and
      we’ll send you a reset link
    </p>

    <div class="auth-input-group">
      <span class="auth-icon">👤</span>
      <input
        type="text"
        placeholder="Email or Phone number"
        [(ngModel)]="identifier"
        name="identifier"
        required
      />
    </div>
    
    <button 
      type="button"
      class="sendresetlink-btn"
      (click)="sendResetCode()">
      Send Reset Code
    </button>

    <p class="signup-text">
      Remember your password?
      <a routerLink="/login">Login</a>
    </p>

  </div>
</div>
