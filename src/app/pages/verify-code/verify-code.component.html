<div class="verify-page">

  <div class="page-logos">
    <img src="assets/eccmslogo.png" alt="E-CCMS Logo">
    <img src="assets/icpep.png" alt="ICPEP Logo">
  </div>

  <div class="verify-card">

    <div class="popup-backdrop" *ngIf="success || error">
      <div class="popup-box" [ngClass]="success ? 'popup-success' : 'popup-error'">
        <div class="popup-icon">
          <span *ngIf="success">&#10003;</span>
          <span *ngIf="error">&#10007;</span>
        </div>
        <h4 class="popup-title">{{ success ? 'Success' : 'Verification Error' }}</h4>
        <p class="popup-message">{{ message }}</p>
        <button class="popup-close-btn" type="button" (click)="closePopup()">
          {{ success ? 'Continue' : 'Try Again' }}
        </button>
      </div>
    </div>

    <h2 class="title">Enter the Verification Code</h2>

    <div class="code-inputs">
  <input type="text" maxlength="1"
         [(ngModel)]="codeDigits[0]"
         name="d0"
         (input)="moveNext($event, 0)"
         (keydown)="moveBack($event, 0)" />

  <input type="text" maxlength="1"
         [(ngModel)]="codeDigits[1]"
         name="d1"
         (input)="moveNext($event, 1)"
         (keydown)="moveBack($event, 1)" />

  <input type="text" maxlength="1"
         [(ngModel)]="codeDigits[2]"
         name="d2"
         (input)="moveNext($event, 2)"
         (keydown)="moveBack($event, 2)" />

  <input type="text" maxlength="1"
         [(ngModel)]="codeDigits[3]"
         name="d3"
         (input)="moveNext($event, 3)"
         (keydown)="moveBack($event, 3)" />

  <input type="text" maxlength="1"
         [(ngModel)]="codeDigits[4]"
         name="d4"
         (input)="moveNext($event, 4)"
         (keydown)="moveBack($event, 4)" />

  <input type="text" maxlength="1"
         [(ngModel)]="codeDigits[5]"
         name="d5"
         (input)="moveNext($event, 5)"
         (keydown)="moveBack($event, 5)" />
</div>

    <button type="button" class="verify-code-btn" (click)="verifyCode()">
        Verify 
      </button>

    <p class="resend-text">
      Didn’t get the code?
      <a href="#" (click)="$event.preventDefault(); resendCode()">Resend</a>
    </p>

    <p class="another-way">
      <a routerLink="/forgot-password">Try another way</a>
    </p>

  </div>

</div>
